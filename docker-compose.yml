services:
  # TimescaleDB (PostgreSQL with time-series optimization)
  db:
    image: timescale/timescaledb:latest-pg17
    container_name: npg-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-nginx_proxy_guard}
    command: postgres -c timezone=${TZ:-UTC} -c log_timezone=${TZ:-UTC} -c shared_preload_libraries=timescaledb -c timescaledb.telemetry_level=off -c max_locks_per_transaction=512
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Valkey (Redis-compatible) for caching
  valkey:
    image: valkey/valkey:9-alpine
    container_name: npg-valkey
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TZ: ${TZ:-UTC}
    command: >
      valkey-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Go API Server
  api:
    image: svrforum/nginxproxyguard-api:latest
    # build:
    #   context: ./api
    #   dockerfile: Dockerfile
    container_name: npg-api
    restart: unless-stopped
    # Container hardening (H8 / MEDIUM-8).
    # no-new-privileges blocks setuid privilege escalation even though the API
    # still runs as root (it needs docker.sock; see api/Dockerfile for why it is
    # not switched to a non-root user). cap_drop ALL removes every Linux
    # capability; DAC_OVERRIDE is re-added because the shared /etc/nginx volume
    # dirs (conf.d, stream.d, certs, modsec) are owned by the nginx user
    # (uid 101, mode 755) — without it even root gets EACCES writing configs.
    #
    # FOLLOW-UP (larger change, tracked separately): front docker.sock with
    # tecnativa/docker-socket-proxy so the API can only LIST/INSPECT/EXEC the
    # nginx container and can never create containers. Sketch:
    #   docker-socket-proxy:
    #     image: tecnativa/docker-socket-proxy
    #     environment: { CONTAINERS: 1, EXEC: 1, POST: 1 }  # tighten further
    #     volumes: [ "/var/run/docker.sock:/var/run/docker.sock:ro" ]
    # then point the api at tcp://docker-socket-proxy:2375 and drop the direct
    # docker.sock mount below + drop root in api/Dockerfile.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ:-UTC}
      PORT: "8080"
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-nginx_proxy_guard}?sslmode=disable
      REDIS_URL: redis://valkey:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-openssl-rand-hex-32}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      NGINX_CONTAINER: npg-proxy
      NGINX_SKIP_TEST: "false"
      # nginx is in host mode, so use host.docker.internal to reach it
      NGINX_STATUS_URL: "http://host.docker.internal:${NGINX_HTTP_PORT:-80}/nginx_status"
      NGINX_ACCESS_LOG: "/etc/nginx/logs/access_raw.log"
      BACKUP_PATH: ${BACKUP_PATH:-/app/data/backups}
      # Docker API version - leave empty for auto-detection (recommended)
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-}
      # Custom nginx listen ports for host network mode (e.g., Synology DSM)
      NGINX_HTTP_PORT: ${NGINX_HTTP_PORT:-}
      NGINX_HTTPS_PORT: ${NGINX_HTTPS_PORT:-}
      # API host port - for host network mode (nginx uses this to reach API)
      API_HOST_PORT: ${API_HOST_PORT:-9080}
      # API host for nginx config generation. Leave empty to derive from
      # API_HOST_PORT (single source of truth); set only to override. Do NOT use
      # nested ${...} defaults here — old compose parsers emit them literally (#158).
      API_HOST: ${API_HOST:-}
    ports:
      # API host port - MUST NOT conflict with NGINX_HTTP_PORT
      - "127.0.0.1:${API_HOST_PORT:-9080}:8080"
    volumes:
      # Consolidated nginx data volume (shared with nginx container)
      - nginx_data:/etc/nginx:rw
      # Consolidated API data volume (config + backups)
      - api_data:/app/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Must exceed the API's startupTimeout (5m, bootstrap/container.go): the
      # API only begins listening after Startup() finishes reconciling every
      # host, so on large/slow installs a 60s window marked it unhealthy and
      # could churn before it ever listened.
      start_period: 360s

  # React UI (Production) - Admin Panel on port 81 (HTTPS)
  ui:
    image: svrforum/nginxproxyguard-ui:latest
    # build:
    #   context: ./ui
    #   dockerfile: Dockerfile
    container_name: npg-ui
    restart: unless-stopped
    # Container hardening (H8 / MEDIUM-8).
    # The UI runs nginx as the non-root "nginx" user (see ui/Dockerfile). We drop
    # ALL capabilities and re-add only NET_BIND_SERVICE, which the non-root nginx
    # needs to bind the privileged container port 443.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${UI_PORT:-81}:443"
    volumes:
      - ui_data:/app/ssl:rw
    depends_on:
      - api

  # Nginx Reverse Proxy - HOST NETWORK MODE
  # Real client IPs are visible directly without proxy protocol
  nginx:
    image: svrforum/nginxproxyguard-nginx:latest
    # build:
    #   context: ./nginx
    #   dockerfile: Dockerfile
    container_name: npg-proxy
    restart: always
    network_mode: host
    # Container hardening (H8 / MEDIUM-8).
    # no-new-privileges blocks setuid privilege escalation. NOTE: do NOT cap_drop
    # this service — it runs nginx in host-network mode with a root master that
    # drops workers to the nginx user, so it needs CHOWN/SETUID/SETGID and binds
    # privileged 80/443; cap_drop ALL breaks boot (nginx [emerg] chown failed).
    # Capability-scoping a rootless nginx is a follow-up.
    security_opt:
      - "no-new-privileges:true"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    environment:
      TZ: ${TZ:-UTC}
    # sysctls not allowed in host network mode
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    volumes:
      # Consolidated nginx data volume
      - nginx_data:/etc/nginx:rw
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${NGINX_HTTP_PORT:-80}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    name: npg_postgres_data
  valkey_data:
    name: npg_valkey_data
  nginx_data:
    name: npg_nginx_data
  api_data:
    name: npg_api_data
  ui_data:
    name: npg_ui_data

networks:
  default:
    name: npg-network
