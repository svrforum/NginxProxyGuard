name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: svrforum/nginxproxyguard

jobs:
  # ============================================================
  # Step 1: Detect Changes
  # ============================================================
  detect:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      api_changed: ${{ steps.changes.outputs.api }}
      ui_changed: ${{ steps.changes.outputs.ui }}
      nginx_changed: ${{ steps.changes.outputs.nginx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check component changes
        id: changes
        run: |
          # Compare files in HEAD against the previous release tag. The old
          # source-hash + manifest-annotation approach was unreliable —
          # `docker buildx imagetools create --annotation index:...` did not
          # propagate the revision annotation to the pushed manifest list on
          # Docker Hub, so REMOTE_HASH always fell back to "none" and every
          # release rebuilt every component (including the 5-9 min nginx
          # ModSecurity build). Git diff between tags is deterministic, has no
          # registry round-trip, and matches developer intuition.
          #
          # HEAD^ is the parent of the release commit so `git describe`
          # returns the prior tag, not the current one. fetch-depth: 0 above
          # guarantees the tag is reachable.
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "ℹ️ No previous tag found - treating all components as changed (first release)"
            echo "api=true" >> $GITHUB_OUTPUT
            echo "ui=true" >> $GITHUB_OUTPUT
            echo "nginx=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "📦 Comparing $PREV_TAG..HEAD"
          CHANGED_FILES=$(git diff --name-only "${PREV_TAG}..HEAD")
          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/^/  /'

          check_changes() {
            local component=$1
            local dir=$2
            if echo "$CHANGED_FILES" | grep -q "^${dir}/"; then
              echo "$component=true" >> $GITHUB_OUTPUT
              echo "✅ $component: changes since $PREV_TAG"
            else
              echo "$component=false" >> $GITHUB_OUTPUT
              echo "⏭️ $component: unchanged since $PREV_TAG"
            fi
          }

          check_changes "api" "api"
          check_changes "ui" "ui"
          check_changes "nginx" "nginx"

  # ============================================================
  # Step 2: Build Images (Parallel, Native Multi-Arch)
  # ============================================================
  build-api:
    name: 🔨 Build API (${{ matrix.arch }})
    needs: detect
    if: needs.detect.outputs.api_changed == 'true'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (test tag)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test-${{ matrix.arch }}
          cache-from: type=gha,scope=api-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=api-${{ matrix.arch }}
          provenance: false

  build-ui:
    name: 🔨 Build UI (${{ matrix.arch }})
    needs: detect
    if: needs.detect.outputs.ui_changed == 'true'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (test tag)
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test-${{ matrix.arch }}
          cache-from: type=gha,scope=ui-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ui-${{ matrix.arch }}
          provenance: false

  build-nginx:
    name: 🔨 Build Nginx (${{ matrix.arch }})
    needs: detect
    if: needs.detect.outputs.nginx_changed == 'true'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (test tag)
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test-${{ matrix.arch }}
          cache-from: type=gha,scope=nginx-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=nginx-${{ matrix.arch }}
          provenance: false

  # ============================================================
  # Step 3: Create Test Manifests
  # ============================================================
  create-test-manifests:
    name: 📦 Create Test Manifests
    needs: [detect, build-api, build-ui, build-nginx]
    if: always() && needs.detect.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create API manifest
        if: needs.detect.outputs.api_changed == 'true' && needs.build-api.result == 'success'
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test \
            ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test

      - name: Create UI manifest
        if: needs.detect.outputs.ui_changed == 'true' && needs.build-ui.result == 'success'
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test \
            ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test

      - name: Create Nginx manifest
        if: needs.detect.outputs.nginx_changed == 'true' && needs.build-nginx.result == 'success'
        run: |
          docker manifest create ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test \
            ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test-arm64
          docker manifest push ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test

  # ============================================================
  # Step 4: E2E Tests - Host Mode
  # ============================================================
  test-host:
    name: 🧪 Test (Host Mode)
    needs: [detect, build-api, build-ui, build-nginx, create-test-manifests]
    if: always() && needs.detect.result == 'success'
    runs-on: ubuntu-latest

    env:
      NGINX_HTTP_PORT: 28080
      NGINX_HTTPS_PORT: 28443
      API_HOST_PORT: 29080
      WHOAMI_PORT: 28888

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare test images
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          API_CHANGED: ${{ needs.detect.outputs.api_changed }}
          UI_CHANGED: ${{ needs.detect.outputs.ui_changed }}
          NGINX_CHANGED: ${{ needs.detect.outputs.nginx_changed }}
        run: |
          pull_image() {
            local component=$1
            local changed=$2

            if [ "$changed" == "true" ]; then
              docker pull ${{ env.IMAGE_PREFIX }}-$component:$VERSION-test
              docker tag ${{ env.IMAGE_PREFIX }}-$component:$VERSION-test ${{ env.IMAGE_PREFIX }}-$component:$VERSION
            else
              docker pull ${{ env.IMAGE_PREFIX }}-$component:latest
              docker tag ${{ env.IMAGE_PREFIX }}-$component:latest ${{ env.IMAGE_PREFIX }}-$component:$VERSION
            fi
          }

          pull_image "api" "$API_CHANGED"
          pull_image "ui" "$UI_CHANGED"
          pull_image "nginx" "$NGINX_CHANGED"

      - name: Start test environment
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          docker compose -f docker-compose.release-test-host.yml up -d db valkey api nginx whoami

      - name: Wait for services
        run: |
          echo "⏳ Waiting for API..."
          timeout 120s bash -c '
            until docker compose -f docker-compose.release-test-host.yml ps 2>/dev/null | grep -E "release-test-host-api.*healthy"; do
              sleep 5
            done
          '
          echo "⏳ Waiting for Nginx..."
          timeout 60s bash -c '
            until docker compose -f docker-compose.release-test-host.yml ps 2>/dev/null | grep -E "release-test-host-nginx.*healthy"; do
              sleep 5
            done
          '
          echo "⏳ Waiting for Whoami to start..."
          sleep 5  # Simple wait - traefik/whoami has no healthcheck tools
          echo "✅ All services ready"
          docker compose -f docker-compose.release-test-host.yml ps

      - name: Run E2E tests
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          docker compose -f docker-compose.release-test-host.yml run --rm test-runner

      - name: Show logs (on failure)
        if: failure()
        run: |
          echo "::group::API Logs"
          docker compose -f docker-compose.release-test-host.yml logs api
          echo "::endgroup::"
          echo "::group::Nginx Logs"
          docker compose -f docker-compose.release-test-host.yml logs nginx
          echo "::endgroup::"
          echo "::group::Whoami Logs"
          docker compose -f docker-compose.release-test-host.yml logs whoami
          echo "::endgroup::"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.release-test-host.yml down -v

  # ============================================================
  # Step 5: Create Final Manifests (retag test images)
  # ============================================================
  create-manifests:
    name: 📦 Create Final Manifests
    needs: [detect, test-host]
    if: needs.test-host.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # For changed components: assemble the multi-arch manifest from the
      # per-arch test images and publish under :VERSION + :latest.
      # For unchanged components: copy the existing :latest manifest to
      # :VERSION so consumers (and the GitHub Release page's pull commands)
      # can always reference an explicit version, regardless of which
      # components were rebuilt.
      - name: Create API manifests
        if: needs.detect.outputs.api_changed == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }} \
            --tag ${{ env.IMAGE_PREFIX }}-api:latest \
            ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }}-test-arm64

      - name: Retag API (unchanged)
        if: needs.detect.outputs.api_changed != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-api:${{ needs.detect.outputs.version }} \
            ${{ env.IMAGE_PREFIX }}-api:latest

      - name: Create UI manifests
        if: needs.detect.outputs.ui_changed == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }} \
            --tag ${{ env.IMAGE_PREFIX }}-ui:latest \
            ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }}-test-arm64

      - name: Retag UI (unchanged)
        if: needs.detect.outputs.ui_changed != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-ui:${{ needs.detect.outputs.version }} \
            ${{ env.IMAGE_PREFIX }}-ui:latest

      - name: Create Nginx manifests
        if: needs.detect.outputs.nginx_changed == 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }} \
            --tag ${{ env.IMAGE_PREFIX }}-nginx:latest \
            ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test-amd64 \
            ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }}-test-arm64

      - name: Retag Nginx (unchanged)
        if: needs.detect.outputs.nginx_changed != 'true'
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_PREFIX }}-nginx:${{ needs.detect.outputs.version }} \
            ${{ env.IMAGE_PREFIX }}-nginx:latest

      - name: Summary
        run: |
          echo "✅ Final images pushed successfully"
          echo "📝 Test tags (${{ needs.detect.outputs.version }}-test) will be overwritten on next release"

  # ============================================================
  # Step 6: Create GitHub Release
  # ============================================================
  release:
    name: 📦 Create Release
    needs: [detect, create-manifests]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release notes
        id: release_notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # 1. 기존 릴리즈 노트 확인 (수동 작성된 것이 있으면 보존)
          EXISTING=$(gh release view "$TAG_NAME" --json body --jq '.body' 2>/dev/null || echo "")

          # 2. Annotated tag 메시지 확인
          TAG_MSG=$(git tag -l --format='%(contents)' "$TAG_NAME" | tail -n +2 | sed '/^$/d')

          # 3. 이전 태그부터 현재까지 커밋 로그로 자동 생성
          PREV_TAG_FOR_LOG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          AUTO_NOTES=""
          if [ -n "$PREV_TAG_FOR_LOG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "$PREV_TAG_FOR_LOG..HEAD" | grep -v "^- release:" | grep -v "^- Merge")
            if [ -n "$COMMITS" ]; then
              AUTO_NOTES=$(printf "## What's Changed\n\n%s" "$COMMITS")
            fi
          fi

          # 우선순위: 기존 릴리즈 노트 > 태그 메시지 > 자동 생성
          if [ -n "$EXISTING" ]; then
            NOTES="$EXISTING"
          elif [ -n "$TAG_MSG" ]; then
            NOTES="$TAG_MSG"
          elif [ -n "$AUTO_NOTES" ]; then
            NOTES="$AUTO_NOTES"
          else
            NOTES=""
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 외부 기여자 수집 (중복 제거)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CONTRIBUTORS=""
          if [ -n "$PREV_TAG" ]; then
            PR_NUMBERS=$(git log --pretty=format:"%s %b" "$PREV_TAG..HEAD" | grep -oE '#[0-9]+' | sort -u | tr -d '#')
            SEEN=""
            for PR in $PR_NUMBERS; do
              PR_AUTHOR=$(gh pr view "$PR" --json author --jq '.author.login' 2>/dev/null || echo "")
              if [ -n "$PR_AUTHOR" ] && [ "$PR_AUTHOR" != "svrforum" ] && ! echo "$SEEN" | grep -qw "$PR_AUTHOR"; then
                SEEN="$SEEN $PR_AUTHOR"
                if [ -z "$CONTRIBUTORS" ]; then
                  CONTRIBUTORS="@$PR_AUTHOR"
                else
                  CONTRIBUTORS="$CONTRIBUTORS, @$PR_AUTHOR"
                fi
              fi
            done
          fi
          echo "contributors=$CONTRIBUTORS" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.detect.outputs.version }}
          body: |
            ${{ steps.release_notes.outputs.notes }}

            ---

            ## Docker Images

            ```bash
            docker pull svrforum/nginxproxyguard-api:${{ needs.detect.outputs.version }}
            docker pull svrforum/nginxproxyguard-ui:${{ needs.detect.outputs.version }}
            docker pull svrforum/nginxproxyguard-nginx:${{ needs.detect.outputs.version }}
            ```

            **Architectures:** `linux/amd64`, `linux/arm64`

            | Component | Status |
            |-----------|--------|
            | API | ${{ needs.detect.outputs.api_changed == 'true' && 'Built' || 'Skipped (no changes)' }} |
            | UI | ${{ needs.detect.outputs.ui_changed == 'true' && 'Built' || 'Skipped (no changes)' }} |
            | Nginx | ${{ needs.detect.outputs.nginx_changed == 'true' && 'Built' || 'Skipped (no changes)' }} |

            ${{ steps.release_notes.outputs.contributors != '' && format('**Contributors:** {0}', steps.release_notes.outputs.contributors) || '' }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ============================================================
  # Cleanup on Failure
  # ============================================================
  cleanup-on-failure:
    name: 🧹 Cleanup (on failure)
    needs: [detect, test-host]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "❌ Tests failed. Deleting tag $TAG_NAME..."
          gh release delete "$TAG_NAME" --yes 2>/dev/null || true
          git push origin :refs/tags/$TAG_NAME || true
          echo "🔧 Please fix the issues and create a new tag."
