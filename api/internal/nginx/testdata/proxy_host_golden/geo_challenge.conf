# Direct-forward upstream (keepalive connection pool to the backend)
# proxy_params.conf already sets the prerequisites: proxy_http_version 1.1 +
# empty Connection header. WebSocket hosts override Connection per-location
# with $connection_upgrade and simply don't benefit from the pool.
upstream npg_direct_00000000_0000_0000_0000_000000000a06 {
    server 127.0.0.1:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}



server {
    listen 80;
    listen [::]:80;
    server_name challenge.example.com;

    # Initialize tracking variables
    set $block_reason_var "-";
    set $bot_category_var "-";
    set $geo_blocked 0;
    set $is_search_bot 0;

    # NPM-compatible variables for custom config
    set $forward_scheme http;
    set $server "127.0.0.1";
    set $port 8080;

    # Shared host stanza: resolver, ACME/challenge skip vars, custom error pages
    include /etc/nginx/conf.d/includes/host_common.conf;



    # ACME HTTP-01 Challenge support (bypass all security checks)
    location /.well-known/acme-challenge/ {
        # Allow all access for certificate validation
        allow all;
        root /etc/nginx/acme-challenge;
        try_files $uri =404;
    }




    # WAF disabled for this host (override global modsecurity on)
    modsecurity off;



    # Geo Restriction (blacklist) - Challenge Mode (processed AFTER WAF)
    # Challenge mode: show CAPTCHA instead of blocking
    set $geo_blocked 0;

    if ($geoip2_country_code ~ "^(CN)$") {
        set $geo_blocked 1;
        set $block_reason_var "geo_block";
    }


























    # Challenge validation endpoint (internal)
    location = /_challenge/validate {
        internal;
        proxy_pass http://127.0.0.1:9080/api/v1/challenge/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Proxy-Host-ID "00000000-0000-0000-0000-000000000a06";
        proxy_set_header X-Challenge-Token $cookie_ng_challenge;
        proxy_set_header X-Geo-Blocked $geo_blocked;
        # Fast timeout - fail fast if API is down
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # API error fallback - allow traffic through when API is down
    location @api_fallback {
        # API is down - allow request to proceed (graceful degradation)
        # Log this event for monitoring
        access_log /etc/nginx/logs/access_raw.log main buffer=64k flush=5s;
        proxy_pass http://npg_direct_00000000_0000_0000_0000_000000000a06;
        # Direct-forward upstream is an upstream group name, so `proxy_redirect
        # default` can't derive the backend URL — rewrite backend Location/Refresh explicitly.
        proxy_redirect http://127.0.0.1:8080/ /;
        include /etc/nginx/includes/proxy_params.conf;
    }

    # Challenge API - Bypass GeoIP and proxy to API service (HTTP server block)
    location /api/v1/challenge/ {
        modsecurity off;

        proxy_pass http://127.0.0.1:9080/api/v1/challenge/;
        proxy_pass_request_body on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }







    location / {

        # Check challenge token for geo-blocked users (skip for search bots)
        set $challenge_check 0;
        if ($geo_blocked = 1) {
            set $challenge_check 1;
        }

        set $challenge_check_final $challenge_check;
        if ($cookie_ng_challenge = "") {
            set $challenge_check_final "${challenge_check}1";
        }
        if ($challenge_check_final = 11) {
            # No token, redirect to challenge page
            return 302 /api/v1/challenge/page?host=00000000-0000-0000-0000-000000000a06&reason=geo_restriction&return=$scheme://$host$request_uri;
        }
        # Validate existing token for geo-blocked users
        # Note: API returns 200 for search bots, so they won't be redirected
        auth_request /_challenge/validate;
        error_page 401 = @challenge_redirect;
        error_page 500 502 503 504 = @api_fallback;


        proxy_pass http://npg_direct_00000000_0000_0000_0000_000000000a06;
        # Direct-forward upstream is an upstream group name, so `proxy_redirect
        # default` can't derive the backend URL — rewrite backend Location/Refresh explicitly.
        proxy_redirect http://127.0.0.1:8080/ /;
        include /etc/nginx/includes/proxy_params.conf;
        
        # Proxy settings (Host-level overrides Global)
        
        
        
        
        
        
        
        
        
        # Proxy buffer settings (from Global Settings)
        
        
        
        
        
        # Bandwidth limiting (from Global Settings)
        
        
        
        
        

    }

    location @challenge_redirect {
        return 302 /api/v1/challenge/page?host=00000000-0000-0000-0000-000000000a06&reason=geo_restriction&return=$scheme://$host$request_uri;
    }









}



