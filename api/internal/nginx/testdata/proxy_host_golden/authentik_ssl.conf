        # Allow all access for certificate validation
        allow all;
        root /etc/nginx/acme-challenge;
        try_files $uri =404;
    }




    # WAF disabled for this host (override global modsecurity on)
    modsecurity off;

























# --- ForwardAuth (authentik) verify endpoint ---
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    # Public outpost location (NOT auth-gated): serves /auth/nginx, /start, /callback
    location /outpost.goauthentik.io {
        proxy_pass http://127.0.0.1:9000/outpost.goauthentik.io;
        proxy_set_header Host $host;
        # Pin https for SSL hosts — same scheme rule as Authelia above. (#180)
        proxy_set_header X-Original-URL https://$http_host$request_uri;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        modsecurity off;
    }


    location @forwardauth_signin {
        internal;
        add_header Set-Cookie $auth_cookie;
        return 302 /outpost.goauthentik.io/start?rd=https://$http_host$request_uri;
    }






    # Redirect HTTP to HTTPS
    


    location / {

# --- ForwardAuth (authentik) gate ---
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @forwardauth_signin;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;
        auth_request_set $fa_username $upstream_http_x_authentik_username;
        auth_request_set $fa_groups $upstream_http_x_authentik_groups;
        auth_request_set $fa_email $upstream_http_x_authentik_email;
        auth_request_set $fa_name $upstream_http_x_authentik_name;
        auth_request_set $fa_uid $upstream_http_x_authentik_uid;
