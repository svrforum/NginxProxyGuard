# Direct-forward upstream (keepalive connection pool to the backend)
# proxy_params.conf already sets the prerequisites: proxy_http_version 1.1 +
# empty Connection header. WebSocket hosts override Connection per-location
# with $connection_upgrade and simply don't benefit from the pool.
upstream npg_direct_00000000_0000_0000_0000_000000000a0b {
    server 127.0.0.1:8080;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}



server {
    listen 80;
    listen [::]:80;
    server_name authentik.example.com;

    # Initialize tracking variables
    set $block_reason_var "-";
    set $bot_category_var "-";
    set $geo_blocked 0;
    set $is_search_bot 0;

    # NPM-compatible variables for custom config
    set $forward_scheme http;
    set $server "127.0.0.1";
    set $port 8080;

    # Shared host stanza: resolver, ACME/challenge skip vars, custom error pages
    include /etc/nginx/conf.d/includes/host_common.conf;



