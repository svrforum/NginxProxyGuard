# Global trusted IPs geo mapping (bypass all security)
geo $trusted_ip_00000000_0000_0000_0000_000000000a09 {
    default 0;

    192.0.2.10 1;

    192.0.2.0/24 1;

}



# Blocked Cloud Provider IPs geo mapping for trusted.example.com
# Using include file for efficiency (1 ranges)
geo $blocked_cloud_00000000_0000_0000_0000_000000000a09 {
    default 0;
    include /etc/nginx/conf.d/includes/cloud_ips_00000000-0000-0000-0000-000000000a09.conf;
}





server {
    listen 80;
    listen [::]:80;
    server_name trusted.example.com;

    # Initialize tracking variables
    set $block_reason_var "-";
    set $bot_category_var "-";
    set $geo_blocked 0;
    set $is_search_bot 0;

    # NPM-compatible variables for custom config
    set $forward_scheme http;
    set $server "127.0.0.1";
    set $port 8080;

    # Resolver for dynamic proxy_pass with variables
    resolver 127.0.0.53 8.8.8.8 valid=30s;



    

    # Skip security checks for ACME HTTP-01 Challenge
    set $skip_security_for_acme 0;
    if ($request_uri ~ "^/.well-known/acme-challenge/") {
        set $skip_security_for_acme 1;
    }
    # Also skip for challenge page to prevent redirect loops
    if ($request_uri ~ "^/api/v1/challenge/") {
        set $skip_security_for_acme 1;
    }

    # ACME HTTP-01 Challenge support (bypass all security checks)
    location /.well-known/acme-challenge/ {
        # Allow all access for certificate validation
        allow all;
        root /etc/nginx/acme-challenge;
        try_files $uri =404;
    }

    # Custom error pages for upstream errors
    error_page 502 /error_502.html;
    error_page 503 /error_503.html;
    error_page 504 /error_504.html;
    location = /error_502.html { internal; root /etc/nginx/html; try_files /502.html =502; }
    location = /error_503.html { internal; root /etc/nginx/html; try_files /503.html =503; }
    location = /error_504.html { internal; root /etc/nginx/html; try_files /504.html =504; }

    # Custom error page for security blocks (WAF, block_exploits, geo restriction, bot filter, etc.)
    error_page 403 @blocked;
    location @blocked {
        root /etc/nginx/html;
        default_type text/html;
        try_files /403.html =403;
    }


    # Geo Restriction (blacklist) - Direct Block Mode (processed BEFORE WAF for performance) - Search Bots Allowed


    # Allow search engine bots - bypass geo restriction
    set $geo_block_check "";

    if ($geoip2_country_code ~ "^(CN|RU)$") {
        set $geo_block_check "Y";
        set $block_reason_var "geo_block";
    }


    # Allow search bots
    if ($is_search_bot = 1) {
        set $geo_block_check "";
        set $block_reason_var "-";
    }
    # Global trusted IPs - bypass geo restriction
    if ($trusted_ip_00000000_0000_0000_0000_000000000a09 = 1) {
        set $geo_block_check "";
        set $block_reason_var "-";
    }
    # Skip geo block for ACME challenge
    set $geo_block_final "${geo_block_check}${skip_security_for_acme}";
    if ($geo_block_final = "Y0") {
        return 403;
    }





    # WAF disabled for this host (override global modsecurity on)
    modsecurity off;





    # Access List: internal-only
    # Note: Access list denials will have block_reason set to access_denied
    set $block_reason_var "access_denied";

    # Global trusted IPs - allow before deny (access phase, first-match wins)
    allow 192.0.2.10;
    allow 192.0.2.0/24;


    allow 10.0.0.0/8;

    deny all;

    deny all;







    # Blocked Cloud Provider IPs check
    # Skip for ACME challenge and challenge page (prevents redirect loops)
    # Priority Allow IPs bypass cloud provider blocking
    set $is_priority_allow_cloud $skip_security_for_acme;


    # Global trusted IPs bypass cloud provider blocking
    if ($trusted_ip_00000000_0000_0000_0000_000000000a09 = 1) {
        set $is_priority_allow_cloud 1;
    }
    set $cloud_block_check_00000000_0000_0000_0000_000000000a09 "${blocked_cloud_00000000_0000_0000_0000_000000000a09}${is_priority_allow_cloud}";

    # Block mode (skip for priority IPs, search bots, and ACME/challenge paths)
    if ($cloud_block_check_00000000_0000_0000_0000_000000000a09 = "10") {
        set $block_reason_var "cloud_provider_block";
        return 403;
    }
















    location / {

        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/includes/proxy_params.conf;
        
