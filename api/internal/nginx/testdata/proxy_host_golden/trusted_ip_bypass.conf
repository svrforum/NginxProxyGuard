    if ($geoip2_country_code ~ "^(CN|RU)$") {
        set $geo_block_check "Y";
        set $block_reason_var "geo_block";
    }


    # Allow search bots
    if ($is_search_bot = 1) {
        set $geo_block_check "";
        set $block_reason_var "-";
    }
    # Global trusted IPs - bypass geo restriction
    if ($trusted_ip_00000000_0000_0000_0000_000000000a09 = 1) {
        set $geo_block_check "";
        set $block_reason_var "-";
    }
    # Skip geo block for ACME challenge
    set $geo_block_final "${geo_block_check}${skip_security_for_acme}";
    if ($geo_block_final = "Y0") {
        return 403;
    }





    # WAF disabled for this host (override global modsecurity on)
    modsecurity off;





    # Access List: internal-only
    # Note: Access list denials will have block_reason set to access_denied
    set $block_reason_var "access_denied";

    # Global trusted IPs - allow before deny (access phase, first-match wins)
    allow 192.0.2.10;
    allow 192.0.2.0/24;


    allow 10.0.0.0/8;

    deny all;

    deny all;









    # Blocked Cloud Provider IPs check
    # Skip for ACME challenge and challenge page (prevents redirect loops)
    # Priority Allow IPs bypass cloud provider blocking
    set $is_priority_allow_cloud $skip_security_for_acme;


    # Global trusted IPs bypass cloud provider blocking
    if ($trusted_ip_00000000_0000_0000_0000_000000000a09 = 1) {
        set $is_priority_allow_cloud 1;
    }
    set $cloud_block_check_00000000_0000_0000_0000_000000000a09 "${blocked_cloud_00000000_0000_0000_0000_000000000a09}${is_priority_allow_cloud}";

    # Block mode (skip for priority IPs, search bots, and ACME/challenge paths)
    if ($cloud_block_check_00000000_0000_0000_0000_000000000a09 = "10") {
        set $block_reason_var "cloud_provider_block";
        return 403;
    }
















    location / {

        proxy_pass http://npg_direct_00000000_0000_0000_0000_000000000a09;
        # Direct-forward upstream is an upstream group name, so `proxy_redirect
